# Cache policies for Daily Dilbert

# Keep dynamic pages fresh while allowing conditional revalidation.
<FilesMatch "\.(php|html?)$">
    Header always set Cache-Control "no-cache, private, must-revalidate"
</FilesMatch>

# Cache comic images aggressively because filenames are immutable per date.
<FilesMatch "\.gif$">
    Header always set Cache-Control "public, max-age=31536000, immutable"
</FilesMatch>
